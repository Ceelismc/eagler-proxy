events {}

http {
    server {
        listen 10000;

        location / {
            # If it's a WebSocket request (Eaglercraft), proxy it to IceHost
            proxy_pass http://83.168.106.243:44008;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # Fallback: If a regular browser/health-check hits it, return a 200 OK text instead of a 404
            error_page 404 405 502 =200 @health;
        }

        location @health {
            return 200 "Eagler Proxy is Online";
            add_header Content-Type text/plain;
        }
    }
}
