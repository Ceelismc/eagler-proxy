events {
    worker_connections 1024;
}

http {
    # Include standard mime types just in case
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 10000;

        location / {
            # Check if this is a WebSocket request (Eaglercraft)
            # If it's NOT a websocket, fall back to the health check response below
            error_page 404 405 502 =200 @health;

            proxy_pass http://83.168.106.243:44008;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # This section intercepts Render's health check and forces a successful 200 OK
        location @health {
            return 200 "Eaglercraft Proxy is Alive!";
            add_header Content-Type text/plain;
        }
    }
}
