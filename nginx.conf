events {}

http {
    server {
        listen 10000;

        location / {
            proxy_pass http://83.168.106.243:44005;
            
            # These 4 lines are what tell IceHost this is a WebSocket connection!
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            
            # This passes the actual player IPs instead of Render's IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Timeouts to stop Render from dropping the connection while playing
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
